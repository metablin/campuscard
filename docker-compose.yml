name: campuscard

services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/campuscard.db
      # Секрет обязателен: без него compose падает с понятной ошибкой
      JWT_SECRET: ${JWT_SECRET:?задайте JWT_SECRET (см. .env.docker.example)}
      DEV_AUTH: ${DEV_AUTH:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FRONTEND_ORIGIN: http://localhost
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      VK_REDIRECT_URI: http://localhost/auth/callback
    volumes:
      - backend-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_VK_APP_ID: ${VK_CLIENT_ID:-}
        VITE_VK_REDIRECT_URI: http://localhost/auth/callback
        VITE_DEV_AUTH: ${DEV_AUTH:-false}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
