server {
    listen 80;
    server_name _;

    # Базовые заголовки безопасности
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    root /usr/share/nginx/html;
    index index.html;

    # NB: add_header из server не наследуется в location с собственным
    # add_header — security-заголовки повторяем в каждом location

    # Ассеты Vite с хэшем в имени — кэшируем навсегда
    location /assets/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA-роутинг: все не-API пути отдают index.html (без кэша,
    # чтобы после деплоя клиенты забирали свежие ссылки на ассеты)
    location / {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API на backend (сервис docker-compose)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
